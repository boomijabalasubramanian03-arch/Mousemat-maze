<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Maze Adventures - Choose Your Journey</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🏰 Story Maze Adventures</h1>
            <p>Choose your story, guide the mouse through magical mazes, and complete your quest!</p>
        </header>

        <div id="home-screen" class="home-screen">
            <div class="home-header">
                <h2>📜 Select Your Adventure</h2>
                <button id="theme-btn" class="btn">🌓 Toggle Theme</button>
            </div>
            <div id="puzzle-list" class="puzzle-list"></div>
        </div>

        <div id="game-screen" class="game-screen hidden">
            <div class="game-header">
                <button id="back-btn" class="btn back-btn">← Back to Adventures</button>
                <div id="story-panel" class="story-panel">
                    <div id="story-chapter"></div>
                    <div id="story-text"></div>
                </div>
            </div>

            <div class="scoreboard">
                <div class="score-card">⏱️ Time: <span id="timer">0.0</span>s</div>
                <div class="score-card">🏆 Completed: <span id="completed-count">0</span></div>
                <button id="reset-btn" class="btn">🔄 New Maze</button>
            </div>

            <div id="canvas-container">
                <canvas id="mazeCanvas" width="660" height="540"></canvas>
            </div>
            
            <div id="status-bar">Hover over the start point to begin!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
